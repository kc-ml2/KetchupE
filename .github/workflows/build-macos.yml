name: Build macOS

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" \
            | base64 --decode \
            > "$CERTIFICATE_PATH"

          security create-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security set-keychain-settings \
            -lut 21600 \
            "$KEYCHAIN_PATH"

          security unlock-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains \
            -d user \
            -s "$KEYCHAIN_PATH"

          security default-keychain \
            -d user \
            -s "$KEYCHAIN_PATH"

          security find-identity \
            -v \
            -p codesigning \
            "$KEYCHAIN_PATH"

      - name: Build frontend and Electron
        run: npm run build
        env:
          # Vite embeds VITE_* values into the renderer bundle at build time.
          # Prefer a repository variable for the API URL; allow a secret fallback
          # for environments that already store it there.
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
      - name: Build, sign and notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: ${{ runner.temp }}/app-signing.keychain-db
          CSC_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          npx electron-builder \
            --mac \
            --publish never \
            -c.forceCodeSigning=true

      - name: Show generated files
        run: find release -maxdepth 2 -type f -print

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KetchupE-macOS
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain \
            "$RUNNER_TEMP/app-signing.keychain-db" || true
